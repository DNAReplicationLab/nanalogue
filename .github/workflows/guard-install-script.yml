# Blocks PRs that modify install.sh unless the author explicitly
# acknowledges the change by including "[install-sh]" in the PR title.
# Also verifies the stored SHA-256 digest stays in sync.

name: Guard install.sh

on:
  push:
    paths:
      - 'install.sh'
      - '.github/install-sh.sha256'
  pull_request:
    paths:
      - 'install.sh'
      - '.github/install-sh.sha256'

permissions:
  contents: read

jobs:
  require-acknowledgement:
    name: Require explicit acknowledgement
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check if install.sh was modified
        id: check-diff
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$base" "$head" | grep -qx 'install.sh'; then
            echo "modified=true" >> "$GITHUB_OUTPUT"
          else
            echo "modified=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check PR title contains [install-sh]
        if: steps.check-diff.outputs.modified == 'true'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $PR_TITLE"
          if echo "$PR_TITLE" | grep -qF '[install-sh]'; then
            echo "✅ PR title contains [install-sh] — change acknowledged."
          else
            echo "::error::This PR modifies install.sh (a security-sensitive file)."
            echo "::error::Add [install-sh] to the PR title to acknowledge this change."
            echo ""
            echo "install.sh is downloaded and executed on user machines."
            echo "Every change must be intentional and reviewed by a maintainer."
            exit 1
          fi

      - name: Skip — install.sh not modified
        if: steps.check-diff.outputs.modified == 'false'
        run: echo "✅ Only the digest file changed — no acknowledgement required."

  verify-digest:
    name: Verify SHA-256 digest is updated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify install.sh matches stored digest
        run: |
          echo "Stored digest:"
          cat .github/install-sh.sha256

          echo ""
          echo "Computed digest:"
          sha256sum install.sh

          if sha256sum --check .github/install-sh.sha256; then
            echo "✅ install.sh matches the stored digest."
          else
            echo "::error::install.sh does NOT match .github/install-sh.sha256"
            echo "::error::If this change is intentional, update the digest file:"
            echo "::error::  sha256sum install.sh > .github/install-sh.sha256"
            exit 1
          fi
