name: Build Release Binaries

on:
  workflow_dispatch:  # Manual triggering
  workflow_call:      # Allow being called by other workflows

permissions:
  contents: read

concurrency:
  group: build-binaries-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_macos_binaries:
    name: Build binaries on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [macos-latest, macos-15-intel]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup default stable

      - name: Build release binaries
        run: |
          . "$HOME/.cargo/env"
          cargo build --release --bins

      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/release/nanalogue dist/nanalogue-macos
          cp target/release/nanalogue_sim_bam dist/nanalogue_sim_bam-macos

      - name: Upload binaries
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: binaries-${{ matrix.os }}
          path: dist/*

  build_linux_binaries:
    name: Build binaries on ${{ matrix.container }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 builds
          - container: quay.io/pypa/musllinux_1_2_x86_64
            runner: ubuntu-latest
          - container: quay.io/pypa/manylinux_2_28_x86_64
            runner: ubuntu-latest
          - container: quay.io/pypa/manylinux_2_34_x86_64
            runner: ubuntu-latest
          - container: quay.io/pypa/manylinux2014_x86_64
            runner: ubuntu-latest
          # ARM64 builds
          - container: quay.io/pypa/musllinux_1_2_aarch64
            runner: ubuntu-24.04-arm
          - container: quay.io/pypa/manylinux_2_28_aarch64
            runner: ubuntu-24.04-arm
          - container: quay.io/pypa/manylinux_2_34_aarch64
            runner: ubuntu-24.04-arm
          - container: quay.io/pypa/manylinux2014_aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - name: Determine compatibility tag
        id: compat
        env:
          CONTAINER: ${{ matrix.container }}
        run: |
          # Determine architecture
          if [[ "$CONTAINER" == *"aarch64"* ]]; then
            ARCH="aarch64"
          else
            ARCH="x86_64"
          fi

          # Determine base tag
          if [[ "$CONTAINER" == *"musllinux_1_2"* ]]; then
            BASE_TAG="musllinux_1_2"
          elif [[ "$CONTAINER" == *"manylinux_2_28"* ]]; then
            BASE_TAG="manylinux_2_28"
          elif [[ "$CONTAINER" == *"manylinux_2_34"* ]]; then
            BASE_TAG="manylinux_2_34"
          elif [[ "$CONTAINER" == *"manylinux2014"* ]]; then
            BASE_TAG="manylinux2014"
          else
            echo "ERROR: Unrecognized container: $CONTAINER"
            exit 1
          fi

          COMPAT_TAG="${BASE_TAG}_${ARCH}"
          echo "tag=$COMPAT_TAG" >> "$GITHUB_OUTPUT"
          echo "COMPAT_TAG=$COMPAT_TAG" >> "$GITHUB_ENV"

      - name: Build binaries in container
        env:
          CONTAINER: ${{ matrix.container }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          docker run --rm \
            -e COMPAT_TAG \
            -e CONTAINER \
            -v "$WORKSPACE":/workspace \
            -w /workspace \
            "$CONTAINER" \
            bash -c '
              set -euo pipefail
              trap '\''echo "ERROR: Build failed at line $LINENO"; exit 1'\'' ERR

              # Install Rust
              curl https://sh.rustup.rs -sSf | sh -s -- -y
              . "$HOME/.cargo/env"

              find_libclang() {
                if [[ -n "${LIBCLANG_VERSION_HINT:-}" ]]; then
                  version_match=$(find /usr/lib /usr/local/lib /lib -type f \( -name "libclang.so" -o -name "libclang.so.*" -o -name "libclang-*.so*" \) 2>/dev/null | grep -E "(/llvm${LIBCLANG_VERSION_HINT}/|libclang[^/]*${LIBCLANG_VERSION_HINT})" | sort -V | tail -1 || true)
                  if [[ -n "$version_match" ]]; then
                    echo "$version_match"
                    return
                  fi
                fi
                find /usr/lib /usr/local/lib /lib -type f \( -name "libclang.so" -o -name "libclang.so.*" -o -name "libclang-*.so*" \) 2>/dev/null | sort -V | tail -1
              }

              prepare_libclang() {
                libclang_file=$(find_libclang)
                if [ -z "$libclang_file" ]; then
                  echo "ERROR: Could not locate libclang after installation"
                  exit 1
                fi
                mkdir -p /tmp/libclang
                cp "$libclang_file" /tmp/libclang/libclang.so
                export LIBCLANG_PATH=/tmp/libclang
              }

              # Install dependencies based on container type
              if [[ "$CONTAINER" == *"musllinux"* ]]; then
                apk add --no-cache \
                  bzip2-dev \
                  bzip2-static \
                  xz-dev \
                  xz-static \
                  zlib-dev \
                  zlib-static \
                  curl-dev \
                  curl-static \
                  openssl-dev \
                  openssl-libs-static \
                  build-base \
                  perl
                # Pin libclang/clang to 16 where available because older
                # libclang releases can be too old for the clang-sys/bindgen
                # APIs needed by hts-sys during release builds.
                if apk add --no-cache clang16 clang16-dev clang16-libclang llvm16-dev llvm16-libs; then
                  export CLANG_PATH=$(command -v clang-16)
                  command -v clang-16 >/dev/null
                  export LIBCLANG_VERSION_HINT=16
                else
                  libclang_installed=false
                  for pkg_set in \
                    "clang clang-dev llvm-libclang" \
                    "clang libclang" \
                    "clang clang-libs"
                  do
                    if apk add --no-cache $pkg_set; then
                      libclang_installed=true
                      break
                    fi
                  done
                  if [[ "$libclang_installed" != true ]]; then
                    echo "ERROR: Failed to install libclang packages"
                    exit 1
                  fi
                fi
                export CFLAGS="-I/usr/include"
              else
                pm=$(command -v dnf || command -v yum)
                "$pm" install -y \
                  bzip2-devel \
                  xz-devel \
                  zlib-devel \
                  libcurl-devel \
                  openssl-devel \
                  perl-IPC-Cmd \
                  perl-core \
                  perl-Time-Piece
                # Pin libclang/clang to 16 for manylinux_2_34 because older
                # libclang releases can be too old for the clang-sys/bindgen
                # APIs needed by hts-sys during release builds.
                if [[ "$CONTAINER" == *"manylinux_2_34"* ]] && "$pm" install -y clang16-devel clang16-libs llvm16-devel llvm16-libs; then
                  export CLANG_PATH=$(command -v clang)
                  command -v clang >/dev/null
                  export LIBCLANG_VERSION_HINT=16
                else
                  libclang_installed=false
                  for pkg_set in \
                    "clang libclang llvm-devel" \
                    "clang clang-devel llvm-devel" \
                    "clang clang-libs llvm-devel" \
                    "clang llvm-devel"
                  do
                    if "$pm" install -y $pkg_set; then
                      libclang_installed=true
                      break
                    fi
                  done
                  if [[ "$libclang_installed" != true ]]; then
                    echo "ERROR: Failed to install libclang packages"
                    exit 1
                  fi
                fi
              fi

              prepare_libclang

              # Build release binaries
              cargo build --release --bins

              # Package binaries
              mkdir -p dist
              tag="$COMPAT_TAG"
              cp target/release/nanalogue "dist/nanalogue-${tag}"
              cp target/release/nanalogue_sim_bam "dist/nanalogue_sim_bam-${tag}"
            '

      - name: Upload binaries
        env:
          WORKSPACE: ${{ github.workspace }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: binaries-${{ steps.compat.outputs.tag }}
          path: ${{ env.WORKSPACE }}/dist/*
