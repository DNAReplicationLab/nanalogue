name: Build Release Binaries

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: build-binaries-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_macos_binaries:
    name: Build binaries on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [macos-latest, macos-15-intel]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup default stable

      - name: Build release binaries
        run: |
          . "$HOME/.cargo/env"
          cargo build --release --bins

      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/release/nanalogue dist/nanalogue-macos
          cp target/release/nanalogue_sim_bam dist/nanalogue_sim_bam-macos

      - name: Upload binaries
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: binaries-${{ matrix.os }}
          path: dist/*

  build_linux_binaries:
    name: Build binaries on ${{ matrix.compat_tag }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            zig_suffix: 2.34
            compat_tag: manylinux_2_34_x86_64
          - runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            zig_suffix: 2.28
            compat_tag: manylinux_2_28_x86_64
          - runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            zig_suffix: 2.17
            compat_tag: manylinux_2_17_x86_64
          - runner: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            zig_suffix: 2.34
            compat_tag: manylinux_2_34_aarch64
          - runner: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            zig_suffix: 2.28
            compat_tag: manylinux_2_28_aarch64
          - runner: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            zig_suffix: 2.17
            compat_tag: manylinux_2_17_aarch64
          - runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-musl
            compat_tag: musllinux_1_2_x86_64
          - runner: ubuntu-latest
            rust_target: aarch64-unknown-linux-musl
            compat_tag: musllinux_1_2_aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup Rust
        env:
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup default stable
          rustup target add "$RUST_TARGET"

      - name: Install Zig
        run: |
          zig_version=0.14.0
          zig_dir="$HOME/.local/zig"
          mkdir -p "$zig_dir"
          curl -fsSL "https://ziglang.org/download/${zig_version}/zig-linux-x86_64-${zig_version}.tar.xz" \
            | tar -xJ --strip-components=1 -C "$zig_dir"
          echo "$zig_dir" >> "$GITHUB_PATH"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            libclang-dev \
            pkg-config \
            perl \
            libssl-dev \
            libcurl4-openssl-dev \
            libbz2-dev \
            liblzma-dev \
            libzstd-dev \
            zlib1g-dev

      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: Determine Zig target
        env:
          RUST_TARGET: ${{ matrix.rust_target }}
          ZIG_SUFFIX: ${{ matrix.zig_suffix }}
        run: |
          target="$RUST_TARGET"
          if [ -n "${ZIG_SUFFIX:-}" ]; then
            target="$target.$ZIG_SUFFIX"
          fi
          echo "TARGET=$target" >> "$GITHUB_ENV"

      - name: Build binaries
        run: cargo zigbuild --release --target "$TARGET" --bins

      - name: Package binaries
        env:
          RUST_TARGET: ${{ matrix.rust_target }}
          COMPAT_TAG: ${{ matrix.compat_tag }}
        run: |
          mkdir -p dist
          cp "target/$RUST_TARGET/release/nanalogue" "dist/nanalogue-$COMPAT_TAG"
          cp "target/$RUST_TARGET/release/nanalogue_sim_bam" "dist/nanalogue_sim_bam-$COMPAT_TAG"

      - name: Upload binaries
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: binaries-${{ matrix.compat_tag }}
          path: dist/*
