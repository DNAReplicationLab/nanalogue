name: Cargo Build & Test (Non-locked packages)

# Although this test is identical to our normal Cargo build & test,
# we have to make this separate as opposed to a matrix job because
# we don't want our badge to be affected.

on:
  push:
    branches: [ "main" ]
  workflow_call:  # Allow calling from release.yml

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.toolchain }}
      cancel-in-progress: true
    name: Rust project - latest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup rustup
        env:
          TOOLCHAIN: ${{ matrix.toolchain }}
        run: rustup update "$TOOLCHAIN" && rustup default "$TOOLCHAIN"
      - name: Delete cargo.lock
        run: rm Cargo.lock
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Cargo clean
        run: cargo clean
