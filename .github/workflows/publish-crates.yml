# Manually triggered workflow to publish to crates.io
name: Publish to crates.io

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (validates package and token without publishing)'
        required: true
        default: true
        type: boolean
  workflow_call:
    inputs:
      dry_run:
        description: 'Dry run (validates package and token without publishing)'
        required: true
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: publish-crates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    permissions:
      contents: read
      id-token: write # crates.io trusted publishing requires OIDC.
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: recursive
      - name: Setup rustup
        run: rustup update stable && rustup default stable
      - name: Exchange OIDC token for crates.io token
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
      - name: Dry run (validate package)
        if: ${{ inputs.dry_run }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --dry-run
      - name: Publish to crates.io
        if: ${{ !inputs.dry_run }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish
