name: Cargo Build & Test

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "main" ]
  workflow_call:  # Allow calling from release.yml

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.toolchain }}
      cancel-in-progress: true
    name: Rust project - latest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup rustup
        env:
          TOOLCHAIN: ${{ matrix.toolchain }}
        run: rustup update "$TOOLCHAIN" && rustup default "$TOOLCHAIN"
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Cargo clean
        run: cargo clean

  dependency_security:
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-security
      cancel-in-progress: true
    name: Dependency security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup rustup
        run: rustup update stable && rustup default stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo audit
        run: cargo audit
      - name: Run cargo deny checks
        run: cargo deny check advisories bans sources
