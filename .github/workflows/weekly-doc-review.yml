name: Weekly Documentation Review

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read # needed to clone the repository contents for the audit

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review_docs:
    name: Review docs for issues
    runs-on: ubuntu-latest
    environment: weekly-doc-review
    permissions:
      contents: write # required to commit and push the generated review branch
      pull-requests: write # required to open a pull request for the review findings

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'

      - name: Review documentation with pi
        timeout-minutes: 20
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.4-mini
        run: node github_workflow_scripts/doc-audit.ts

      - name: Check for documentation changes
        id: changes
        run: |
          set -euo pipefail

          if [ -n "$(git status --porcelain=v1 --untracked-files=all)" ]; then
            echo "has_changes=true" >>"$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Open pull request when changes exist
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          branch="bot/weekly-doc-review"
          body_file="/tmp/weekly-doc-review-pr-body.md"

          printf '%s\n' \
            'Automated weekly documentation review changes.' \
            '' \
            'The audit script updated repository files to improve documentation.' \
            >"$body_file"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch -C "$branch"

          untracked_files="$(git ls-files --others --exclude-standard)"
          if [ -n "$untracked_files" ]; then
            printf '%s\n' "Unexpected new files were created by the audit:" "$untracked_files"
            exit 1
          fi

          git add -u
          if git diff --cached --quiet; then
            echo "No tracked documentation changes to commit."
            exit 0
          fi
          git commit -m "Updates documentation via weekly audit"
          gh auth setup-git
          git push --force-with-lease --set-upstream origin "$branch"

          pr_number="$(gh pr list --head "$branch" --state open --json number --jq '.[0].number // empty')"
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" \
              --title "docs: weekly documentation audit" \
              --body-file "$body_file"
          else
            gh pr create \
              --title "docs: weekly documentation audit" \
              --body-file "$body_file" \
              --head "$branch" \
              --base "$BASE_BRANCH"
          fi
