# Tests downstream packages (pynanalogue, nanalogue-node) against the current
# nanalogue commit using Cargo's [patch.crates-io] mechanism. Non-blocking:
# failures surface as warnings but do not prevent merges.

name: Test Sister Packages

permissions:
  contents: read

on:
  schedule:
    - cron: '0 6 */3 * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test-pynanalogue:
    name: pynanalogue (Rust + Python)
    runs-on: ubuntu-latest
    continue-on-error: true
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-pynanalogue
      cancel-in-progress: true
    steps:
      - name: Determine nanalogue repo and commit SHA
        id: source
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          PR_REPO: ${{ github.event.pull_request.head.repo.clone_url }}
          GIT_SHA: ${{ github.sha }}
          GIT_REPO: https://github.com/${{ github.repository }}.git
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "sha=$PR_SHA" >> "$GITHUB_OUTPUT"
            echo "repo=$PR_REPO" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$GIT_SHA" >> "$GITHUB_OUTPUT"
            echo "repo=$GIT_REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout pynanalogue
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: DNAReplicationLab/pynanalogue
          persist-credentials: false

      - name: Setup Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Patch Cargo.toml to use nanalogue from this commit
        env:
          SOURCE_REPO: ${{ steps.source.outputs.repo }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          printf '\n[patch.crates-io]\nnanalogue = { git = "%s", rev = "%s" }\n' \
            "$SOURCE_REPO" "$SOURCE_SHA" >> Cargo.toml

      - name: Remove Cargo.lock to re-resolve dependencies
        run: rm -f Cargo.lock

      - name: Cargo test
        run: cargo test --verbose

      - name: Install maturin and test dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install maturin pytest pytest-cov pytest-benchmark

      - name: Build and install pynanalogue
        run: |
          . .venv/bin/activate
          maturin develop --release

      - name: Run Python tests
        run: |
          . .venv/bin/activate
          pytest tests/ -v

  test-nanalogue-node:
    name: nanalogue-node (Rust + Node.js)
    runs-on: ubuntu-latest
    continue-on-error: true
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-node
      cancel-in-progress: true
    steps:
      - name: Determine nanalogue repo and commit SHA
        id: source
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          PR_REPO: ${{ github.event.pull_request.head.repo.clone_url }}
          GIT_SHA: ${{ github.sha }}
          GIT_REPO: https://github.com/${{ github.repository }}.git
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "sha=$PR_SHA" >> "$GITHUB_OUTPUT"
            echo "repo=$PR_REPO" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$GIT_SHA" >> "$GITHUB_OUTPUT"
            echo "repo=$GIT_REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout nanalogue-node
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: sathish-t/nanalogue-node
          persist-credentials: false

      - name: Setup Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"

      - name: Patch Cargo.toml to use nanalogue from this commit
        env:
          SOURCE_REPO: ${{ steps.source.outputs.repo }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          printf '\n[patch.crates-io]\nnanalogue = { git = "%s", rev = "%s" }\n' \
            "$SOURCE_REPO" "$SOURCE_SHA" >> Cargo.toml

      - name: Remove Cargo.lock to re-resolve dependencies
        run: rm -f Cargo.lock

      - name: Cargo test
        run: cargo test --verbose

      - name: Install npm dependencies
        run: npm install

      - name: Build native module
        run: npm run build

      - name: Run Node.js tests
        run: npm test
