name: Build Docker Image

permissions:
  contents: read

on:
  workflow_dispatch:  # Manual triggering
  workflow_call:      # Allow being called by other workflows

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_docker_image:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        run: |
          docker buildx create --use --name builder --driver docker-container

      - name: Build Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg RUST_TARGET=x86_64-unknown-linux-musl \
            --tag nanalogue:latest \
            --tag nanalogue:"$IMAGE_TAG" \
            --load \
            .

      - name: Test Docker image
        run: |
          docker run --rm nanalogue:latest nanalogue --version
          docker run --rm nanalogue:latest nanalogue_sim_bam --help

      - name: Save Docker image to artifact
        run: |
          mkdir -p dist
          docker save nanalogue:latest | gzip > dist/nanalogue-docker-image-amd64.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docker-image-amd64
          path: dist/nanalogue-docker-image-amd64.tar.gz
